<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bauzeitenplan Vollansicht</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {--bg:#f4f1ea;--surface:#fbfaf7;--surface-2:#f0ece4;--text:#22201c;--muted:#6e6a63;--border:#d7d1c7;--accent:#0f766e;--accent-2:#2563eb;--accent-3:#b45309;--accent-4:#9333ea;--accent-5:#be123c;--radius:16px;--shadow:0 10px 30px rgba(34,32,28,.08)}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
    .wrap{max-width:1600px;margin:0 auto;padding:18px}.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
    .toolbar{padding:14px 16px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#fbfaf7 0%,#f7f4ee 100%);display:grid;grid-template-columns:1.5fr .9fr .9fr auto auto auto;gap:10px;align-items:center}
    .toolbar input,.toolbar button{font:inherit;border-radius:12px;border:1px solid var(--border);background:white;color:var(--text);padding:11px 12px;min-height:44px}.toolbar button{background:var(--accent);color:white;border:none;font-weight:600}.toolbar button.secondary{background:var(--surface-2);color:var(--text);border:1px solid var(--border)}
    .color-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.color-chip{width:24px;height:24px;border-radius:999px;border:2px solid transparent;cursor:pointer}.color-chip.active{border-color:#111}
    .content{padding:14px 16px 18px}.topline{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap;margin-bottom:10px}h1{margin:0;font-size:22px;line-height:1.1}.range-title{font-size:16px;font-weight:700}
    .danger{background:#fff1f2;color:#9f1239;border:1px solid #fecdd3;padding:10px 12px;border-radius:12px;font-size:13px;display:none;margin-bottom:12px}.board-wrap{overflow:auto;border-radius:14px;border:1px solid var(--border);background:white}.board{min-width:1460px}
    .grid{display:grid;grid-template-columns:repeat(36,minmax(36px,1fr))}.cell{border-right:1px solid #e8e2d9;border-bottom:1px solid #e8e2d9;min-height:54px;display:flex;align-items:center;justify-content:center;font-size:12px;text-align:center}.head{background:#f3efe8;font-weight:700;position:sticky;top:0;z-index:3}
    .day-col{flex-direction:column;gap:2px;line-height:1.15}.day-col .top{font-size:11px;color:var(--muted);font-weight:600}.day-col .num{font-size:14px;color:var(--text)}.weekend{background:#faf7f2}.today{box-shadow:inset 0 0 0 2px var(--accent);background:#edf8f6}.past{opacity:.72}
    .lane{display:grid;grid-template-columns:repeat(36,minmax(36px,1fr));align-items:stretch;min-height:62px;position:relative;border-bottom:1px solid #e8e2d9;background-image:linear-gradient(to right,#e8e2d9 1px,transparent 1px);background-size:calc(100% / 36) 100%}.lane-day.weekend{background:#faf7f2}.lane-day.today{box-shadow:inset 0 0 0 2px var(--accent);background:#edf8f6}.lane-day.past{opacity:.72}
    .bar{position:absolute;top:10px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;padding:0 12px;font-size:13px;font-weight:700;color:#1f2937;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;box-shadow:inset 0 0 0 1px rgba(34,32,28,.06);cursor:pointer}.bar-1{background:rgba(15,118,110,.28)} .bar-2{background:rgba(37,99,235,.25)} .bar-3{background:rgba(180,83,9,.28)} .bar-4{background:rgba(147,51,234,.24)} .bar-5{background:rgba(190,18,60,.22)}
    .legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.legend-item{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted)}.legend-box{width:16px;height:16px;border-radius:5px}
    .listbar{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.entry{border:1px solid var(--border);border-radius:14px;background:white;padding:10px 12px;min-width:220px;max-width:260px}.entry-top{display:flex;justify-content:space-between;gap:10px;align-items:center}.badge{font-size:11px;padding:4px 7px;border-radius:999px;background:var(--surface-2)} .entry small{color:var(--muted);display:block;margin-top:6px}.entry-actions{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}.entry-actions button{font:inherit;border-radius:10px;border:1px solid var(--border);background:white;color:var(--text);padding:8px 10px}.entry-actions .secondary{background:var(--surface-2)}
    @media (max-width:1200px){.toolbar{grid-template-columns:1fr 1fr 1fr;}.color-row{grid-column:1 / -1}.toolbar button{width:100%}} @media (max-width:760px){.toolbar{grid-template-columns:1fr 1fr}.topline{flex-direction:column}.entry{min-width:100%}}
  </style>
</head>
<body>
  <div class="wrap"><div class="card">
    <div class="toolbar">
      <input id="siteName" type="text" placeholder="Baustelle" />
      <input id="startDate" type="date" />
      <input id="endDate" type="date" />
      <div class="color-row" id="colorRow"></div>
      <button id="saveBtn">Hinzufügen</button>
      <button class="secondary" id="cancelEditBtn" style="display:none;">Abbrechen</button>
      <button class="secondary" id="newBtn">Neu</button>
    </div>
    <div class="content">
      <div class="topline"><h1>Bauzeitenplan rollierende Ansicht</h1><div class="range-title" id="rangeTitle">Zeitraum</div></div>
      <div class="danger" id="errorBox"></div>
      <div class="board-wrap"><div class="board"><div class="grid" id="headerGrid"></div><div id="lanes"></div></div></div>
      <div class="legend"><div class="legend-item"><span class="legend-box" style="background:rgba(15,118,110,.28)"></span> Farbe 1</div><div class="legend-item"><span class="legend-box" style="background:rgba(37,99,235,.25)"></span> Farbe 2</div><div class="legend-item"><span class="legend-box" style="background:rgba(180,83,9,.28)"></span> Farbe 3</div><div class="legend-item"><span class="legend-box" style="background:rgba(147,51,234,.24)"></span> Farbe 4</div><div class="legend-item"><span class="legend-box" style="background:rgba(190,18,60,.22)"></span> Farbe 5</div></div>
      <div class="listbar" id="entries"></div>
    </div>
  </div></div>
<script>
const headerGrid=document.getElementById('headerGrid'),lanes=document.getElementById('lanes'),rangeTitle=document.getElementById('rangeTitle'),entriesBox=document.getElementById('entries'),errorBox=document.getElementById('errorBox'),colorRow=document.getElementById('colorRow'),saveBtn=document.getElementById('saveBtn'),cancelEditBtn=document.getElementById('cancelEditBtn'),newBtn=document.getElementById('newBtn'),siteNameInput=document.getElementById('siteName'),startDateInput=document.getElementById('startDate'),endDateInput=document.getElementById('endDate');
const colors=[1,2,3,4,5]; let selectedColor=1,editIndex=null,baseToday=new Date(); baseToday=new Date(baseToday.getFullYear(),baseToday.getMonth(),baseToday.getDate());
let plans=[{name:'Heldenbergen, Gartenstr 10',start:'2026-06-30',end:'2026-07-04',color:1},{name:'Ostheim Gärtnerplatz',start:'2026-07-02',end:'2026-07-11',color:2},{name:'Ostheim',start:'2026-07-16',end:'2026-07-21',color:3}];
function initColors(){colors.forEach(c=>{const btn=document.createElement('button');btn.type='button';btn.className='color-chip'+(c===selectedColor?' active':'');btn.style.background=getComputedStyle(document.documentElement).getPropertyValue(`--accent${c===1?'':'-'+c}`)||'#ccc';btn.addEventListener('click',()=>{selectedColor=c;document.querySelectorAll('.color-chip').forEach(x=>x.classList.remove('active'));btn.classList.add('active')});colorRow.appendChild(btn)})}
function setActiveColor(color){selectedColor=color;document.querySelectorAll('.color-chip').forEach((x,idx)=>x.classList.toggle('active',colors[idx]===color))}
function addDays(date,days){const d=new Date(date);d.setDate(d.getDate()+days);return new Date(d.getFullYear(),d.getMonth(),d.getDate())}
function formatDate(v){const d=new Date(v);return d.toLocaleDateString('de-DE')} function weekdayShort(date){return ['So','Mo','Di','Mi','Do','Fr','Sa'][date.getDay()]} function iso(date){return date.toISOString().slice(0,10)} function diffDays(a,b){return Math.round((b-a)/86400000)}
function resetForm(){editIndex=null;saveBtn.textContent='Hinzufügen';cancelEditBtn.style.display='none';siteNameInput.value='';startDateInput.value='';endDateInput.value='';setActiveColor(1);errorBox.style.display='none'}
function startEdit(index){const plan=plans[index];editIndex=index;saveBtn.textContent='Speichern';cancelEditBtn.style.display='inline-flex';siteNameInput.value=plan.name;startDateInput.value=plan.start;endDateInput.value=plan.end;setActiveColor(plan.color);siteNameInput.focus()}
function renderHeader(days,startRange,endRange){rangeTitle.textContent=`${formatDate(startRange)} bis ${formatDate(endRange)}`;headerGrid.innerHTML='';days.forEach(day=>{const cell=document.createElement('div');cell.className='cell head day-col';if(day.getDay()===0||day.getDay()===6)cell.classList.add('weekend');if(iso(day)===iso(baseToday))cell.classList.add('today');if(day<baseToday)cell.classList.add('past');cell.innerHTML=`<div class="top">${weekdayShort(day)}</div><div class="num">${day.getDate()}</div>`;headerGrid.appendChild(cell)})}
function renderLanes(days,startRange,endRange){lanes.innerHTML='';const visiblePlans=plans.filter(p=>new Date(p.start)<=endRange&&new Date(p.end)>=startRange).sort((a,b)=>new Date(a.start)-new Date(b.start));visiblePlans.forEach(plan=>{const lane=document.createElement('div');lane.className='lane';days.forEach(day=>{const d=document.createElement('div');d.className='lane-day';if(day.getDay()===0||day.getDay()===6)d.classList.add('weekend');if(iso(day)===iso(baseToday))d.classList.add('today');if(day<baseToday)d.classList.add('past');lane.appendChild(d)});const planStart=new Date(plan.start),planEnd=new Date(plan.end),visibleStart=planStart<startRange?startRange:planStart,visibleEnd=planEnd>endRange?endRange:planEnd,startIndex=diffDays(startRange,new Date(visibleStart.getFullYear(),visibleStart.getMonth(),visibleStart.getDate())),endIndex=diffDays(startRange,new Date(visibleEnd.getFullYear(),visibleEnd.getMonth(),visibleEnd.getDate())),spanDays=endIndex-startIndex+1;const bar=document.createElement('div');bar.className=`bar bar-${plan.color}`;bar.style.left=`calc(${startIndex} * (100% / 36) + 4px)`;bar.style.width=`calc(${spanDays} * (100% / 36) - 8px)`;bar.textContent=plan.name;lane.appendChild(bar);lanes.appendChild(lane)});if(!visiblePlans.length){lanes.innerHTML='<div class="entry" style="margin:12px;">Keine Baustellen im aktuellen Zeitraum.</div>'}}
function renderBoard(){const startRange=addDays(baseToday,-7),endRange=addDays(baseToday,28),days=[];for(let i=0;i<=35;i++)days.push(addDays(startRange,i));renderHeader(days,startRange,endRange);renderLanes(days,startRange,endRange)}
function renderEntries(){entriesBox.innerHTML='';if(!plans.length){entriesBox.innerHTML='<div class="entry"><small>Noch keine Baustellen erfasst.</small></div>';return} plans.slice().sort((a,b)=>new Date(a.start)-new Date(b.start)).forEach(plan=>{const realIndex=plans.findIndex(p=>p===plan);const item=document.createElement('div');item.className='entry';item.innerHTML=`<div class="entry-top"><strong>${plan.name}</strong><span class="badge">Farbe ${plan.color}</span></div><small>${formatDate(plan.start)} bis ${formatDate(plan.end)}</small><div class="entry-actions"><button class="secondary" data-edit="${realIndex}" type="button">Bearbeiten</button><button data-del="${realIndex}" type="button">Löschen</button></div>`;entriesBox.appendChild(item)});document.querySelectorAll('[data-del]').forEach(btn=>{btn.addEventListener('click',()=>{const idx=Number(btn.dataset.del);plans.splice(idx,1);if(editIndex===idx)resetForm();renderEntries();renderBoard()})});document.querySelectorAll('[data-edit]').forEach(btn=>{btn.addEventListener('click',()=>startEdit(Number(btn.dataset.edit)))})}
saveBtn.addEventListener('click',()=>{const name=siteNameInput.value.trim(),start=startDateInput.value,end=endDateInput.value;errorBox.style.display='none';if(!name||!start||!end){errorBox.textContent='Bitte Baustelle, Startdatum und Enddatum eintragen.';errorBox.style.display='block';return} if(new Date(end)<new Date(start)){errorBox.textContent='Enddatum darf nicht vor dem Startdatum liegen.';errorBox.style.display='block';return} const record={name,start,end,color:selectedColor};if(editIndex===null){plans.push(record)}else{plans[editIndex]=record} resetForm();renderEntries();renderBoard()});
cancelEditBtn.addEventListener('click',resetForm); newBtn.addEventListener('click',resetForm); initColors(); resetForm(); renderEntries(); renderBoard();
</script></body></html>
